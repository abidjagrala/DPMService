<div class="flex items-center gap-3 my-2 p-3 bg-base-200 rounded-lg border border-base-300">
    <span class="text-lg font-mono font-bold text-base-content select-none">
        {{ a }} {{ operator }} {{ b }} =
    </span>
    <input
        type="text"
        name="{{ name }}"
        class="input input-bordered input-sm w-24 text-center font-mono"
        autocomplete="off"
        required
        placeholder="?"
        inputmode="numeric"
        {% for k, v in attrs.items %}{{ k }}="{{ v }}" {% endfor %}
    >
</div>
