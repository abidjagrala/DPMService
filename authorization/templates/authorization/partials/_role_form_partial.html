{% load i18n %}
<form method="post" hx-post="{{ request.path }}" hx-target="#page-content" hx-push-url="true">
    {% csrf_token %}
    <div class="space-y-4">
        <div class="form-control">
            <label class="label"><span class="label-text font-medium">{% trans "Name" %}</span></label>
            {{ form.name }}
            {% if form.name.errors %}<label class="label"><span class="label-text-alt text-error">{{ form.name.errors.0 }}</span></label>{% endif %}
        </div>
        <div class="form-control">
            <label class="label"><span class="label-text font-medium">{% trans "Description" %}</span></label>
            {{ form.description }}
        </div>
        <div class="form-control">
            <label class="label"><span class="label-text font-medium">{% trans "Group" %}</span></label>
            {{ form.group }}
        </div>
        <div class="form-control">
            <label class="label cursor-pointer justify-start gap-2">
                {{ form.is_active }}
                <span class="label-text">{% trans "Active" %}</span>
            </label>
        </div>
        <div class="flex justify-end gap-2 mt-4">
            <a href="{% url 'authorization:role_list' %}" class="btn btn-ghost" hx-get="{% url 'authorization:role_list' %}" hx-target="#page-content" hx-push-url="true">{% trans "Cancel" %}</a>
            <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
        </div>
    </div>
</form>
