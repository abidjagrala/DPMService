{% load i18n %}

<div class="p-4 space-y-4">
    <h3 class="font-semibold text-lg">{% trans "Delete Homeworker" %}</h3>
    <p>{% blocktrans with name=obj.name %}Are you sure you want to delete <strong>{{ name }}</strong>?{% endblocktrans %}</p>
    <form hx-post="{% url 'clients:homeworker_delete' pk=obj.pk %}" hx-target="this" hx-swap="outerHTML">
        {% csrf_token %}
        <div class="flex justify-end gap-2">
            <button type="button" class="btn btn-ghost btn-sm" @click="$dispatch('close-modal')">{% trans "Cancel" %}</button>
            <button type="submit" class="btn btn-error btn-sm">{% trans "Delete" %}</button>
        </div>
    </form>
</div>
