{% load i18n crispy_forms_tags %}

<form hx-post="{% if mode == 'create' %}{% url 'masters:state_create' %}{% else %}{% url 'masters:state_update' pk=obj.pk %}{% endif %}"
      hx-target="this"
      hx-swap="outerHTML"
      class="space-y-3">
    {% csrf_token %}
    {% if form.non_field_errors %}
        <div class="alert alert-error">
            {% for error in form.non_field_errors %}
                <span>{{ error }}</span>
            {% endfor %}
        </div>
    {% endif %}
    {% for field in form %}
        <div class="form-control">
            <label for="{{ field.id_for_label }}" class="label">
                <span class="label-text font-medium">{{ field.label }}</span>
                {% if field.field.required %}
                    <span class="label-text-alt text-error">*</span>
                {% endif %}
            </label>
            {{ field }}
            {% if field.help_text %}
                <label class="label">
                    <span class="label-text-alt">{{ field.help_text }}</span>
                </label>
            {% endif %}
            {% if field.errors %}
                <label class="label">
                    <span class="label-text-alt text-error">{{ field.errors.0 }}</span>
                </label>
            {% endif %}
        </div>
    {% endfor %}

    <div class="flex justify-end gap-2 pt-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="$dispatch('close-drawer')">{% trans "Cancel" %}</button>
        <button type="submit" class="btn btn-primary btn-sm">
            {% if mode == 'create' %}{% trans "Create" %}{% else %}{% trans "Save" %}{% endif %}
        </button>
    </div>
</form>
