{% extends "masters/base.html" %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">{{ page_title }}</h1>

<div class="card bg-base-100 shadow w-full max-w-lg">
    <div class="card-body">
        <p>{% trans "Are you sure you want to delete" %} <strong>{{ obj.name }}</strong>?</p>
        <form method="post" action="{% url 'masters:city_delete' pk=obj.pk %}" class="mt-4">
            {% csrf_token %}
            <div class="flex justify-end gap-2">
                <a href="{% url 'masters:city_list' %}" class="btn btn-ghost">{% trans "Cancel" %}</a>
                <button type="submit" class="btn btn-error">{% trans "Delete" %}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
