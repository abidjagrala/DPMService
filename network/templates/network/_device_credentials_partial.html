{% load i18n %}
<div class="p-4 space-y-4">
    <h3 class="font-semibold text-sm">{{ obj.name }}</h3>
    <dl class="grid grid-cols-1 gap-y-3 text-sm">
        <dt class="text-base-content/60">{% trans "Username" %}</dt>
        <dd class="font-medium">
            {% if obj.username %}
                <div class="flex items-center gap-2">
                    <span id="dev-cred-username">{{ obj.username }}</span>
                    <button type="button" class="btn btn-ghost btn-xs" onclick="navigator.clipboard.writeText(document.getElementById('dev-cred-username').textContent)">{% trans "Copy" %}</button>
                </div>
            {% else %}
                <span class="text-base-content/40">—</span>
            {% endif %}
        </dd>

        <dt class="text-base-content/60">{% trans "Password" %}</dt>
        <dd class="font-medium">
            {% if obj.password %}
                <div class="flex items-center gap-2" x-data="{ show: false }">
                    <span id="dev-cred-password" x-text="show ? '{{ obj.password|escapejs }}' : '••••••••'"></span>
                    <button type="button" class="btn btn-ghost btn-xs" @click="show = !show">
                        <span x-text="show ? '{% trans "Hide" %}' : '{% trans "Show" %}'"></span>
                    </button>
                    <button type="button" class="btn btn-ghost btn-xs" onclick="navigator.clipboard.writeText('{{ obj.password|escapejs }}')">{% trans "Copy" %}</button>
                </div>
            {% else %}
                <span class="text-base-content/40">—</span>
            {% endif %}
        </dd>
    </dl>
</div>
