{% load i18n %}
<div x-data="multiDevice()" class="space-y-4">
    <form hx-post="{% url 'network:device_multi_create' %}" hx-target="this" hx-swap="outerHTML" class="space-y-4">
        {% csrf_token %}
        <div class="grid grid-cols-2 gap-3">
            <div class="form-control">
                <label class="label"><span class="label-text font-medium">{% trans "Device Name" %} <span class="text-error">*</span></span></label>
                <input type="text" name="name_prefix" x-model="namePrefix"
                       @input="generateRows()"
                       placeholder="{% trans 'e.g. Dome Camera' %}" class="input input-bordered input-sm w-full">
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text font-medium">{% trans "Starting IP" %} <span class="text-error">*</span></span></label>
                <input type="text" name="starting_ip" x-model="startingIP"
                       @input="generateRows()"
                       placeholder="{% trans '192.168.0.11' %}" class="input input-bordered input-sm w-full">
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text font-medium">{% trans "Client" %}</span></label>
                <select name="client" x-model="clientID" class="select select-bordered select-sm w-full">
                    <option value="">{% trans "Select client" %}</option>
                    {% for c in clients %}
                        <option value="{{ c.pk }}">{{ c.company_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-control">
                <label class="label"><span class="label-text font-medium">{% trans "Quantity" %} <span class="text-error">*</span></span></label>
                <input type="number" name="count" x-model.number="count" min="1" max="20"
                       @input="generateRows()"
                       class="input input-bordered input-sm w-full">
            </div>
        </div>

        <div class="overflow-x-auto" x-show="rows.length > 0">
            <table class="table table-sm table-zebra">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>{% trans "Name" %}</th>
                        <th>{% trans "IP Address" %}</th>
                        <th>{% trans "Type" %}</th>
                        <th>{% trans "Brand" %}</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="(row, i) in rows" :key="i">
                        <tr>
                            <td x-text="i + 1"></td>
                            <td>
                                <input type="text" :name="'name_' + i" x-model="row.name"
                                       @change="markEdited(i)"
                                       class="input input-bordered input-xs w-full">
                            </td>
                            <td>
                                <input type="text" :name="'ip_' + i" x-model="row.ip" readonly
                                       class="input input-bordered input-xs w-full bg-base-200">
                            </td>
                            <td>
                                <select :name="'device_type_' + i" x-model="row.deviceType"
                                        @change="markEdited(i)"
                                        class="select select-bordered select-xs w-full">
                                    {% for value, label in device_types %}
                                        <option value="{{ value }}">{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td>
                                <input type="text" :name="'brand_' + i" x-model="row.brand"
                                       @change="markEdited(i)"
                                       class="input input-bordered input-xs w-full">
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <div class="flex justify-end gap-2 pt-2">
            <button type="button" class="btn btn-ghost btn-sm" @click="$dispatch('close-drawer')">{% trans "Cancel" %}</button>
            <button type="submit" class="btn btn-primary btn-sm" :disabled="rows.length === 0">
                {% trans "Create Devices" %}
            </button>
        </div>
    </form>
</div>
