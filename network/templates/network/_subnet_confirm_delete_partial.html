{% load i18n %}

<div class="p-4">
    <h3 class="font-semibold text-lg">{% trans "Delete subnet" %}</h3>
    <p class="text-sm text-base-content/60 mt-1">{% trans "This will also delete all IPs in this subnet." %}</p>
    <dl class="grid grid-cols-3 gap-y-2 gap-x-4 text-sm mt-4">
        <dt class="text-base-content/60">{% trans "Name" %}</dt>
        <dd class="col-span-2 font-medium">{{ obj.name }}</dd>
        <dt class="text-base-content/60">{% trans "CIDR" %}</dt>
        <dd class="col-span-2 font-medium"><code>{{ obj.cidr }}</code></dd>
    </dl>
    <form hx-post="{% url 'network:subnet_delete' pk=obj.pk %}" hx-target="this" hx-swap="outerHTML" class="flex justify-end gap-2 mt-6">
        {% csrf_token %}
        <button type="button" class="btn btn-ghost btn-sm" @click="$dispatch('close-modal')">{% trans "Cancel" %}</button>
        <button type="submit" class="btn btn-error btn-sm">{% trans "Yes, delete" %}</button>
    </form>
</div>
