{% extends "network/base.html" %}
{% load i18n %}

{% block content %}
<h1 class="text-2xl font-semibold mb-6">{{ page_title }}</h1>
<div class="card bg-base-100 border border-base-300 shadow-sm">
    <div class="card-body">
        <p>{% trans "Are you sure you want to delete" %} <strong>{{ obj.ip_address }}</strong>?</p>
        <form method="post" action="{% url 'network:ip_delete' pk=obj.pk %}" class="mt-4">
            {% csrf_token %}
            <div class="flex justify-end gap-2">
                <a href="{% url 'network:ip_list' %}" class="btn btn-ghost">{% trans "Cancel" %}</a>
                <button type="submit" class="btn btn-error">{% trans "Delete" %}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
