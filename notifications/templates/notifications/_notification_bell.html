{% load comments %}
<div x-data="{ open: false, badgeCount: 0 }" class="relative">
  <button class="btn btn-ghost btn-sm btn-circle"
          @click="open = !open">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
    </svg>
    <span id="notification-badge"
          x-show="badgeCount > 0"
          x-text="badgeCount"
          class="absolute -top-1 -right-1 badge badge-primary badge-xs"></span>
  </button>
  <span id="notification-count-sentinel"
        hx-get="{% url 'notifications:unread_count' %}"
        hx-trigger="load, notification-updated from:body"
        hx-swap="none"
        hx-on:htmx:after-request="badgeCount = parseInt(event.detail.xhr.responseText) || 0"></span>

  <div x-show="open" @click.outside="open = false" x-cloak
       x-transition
       class="absolute right-0 mt-2 w-80 bg-base-100 border border-base-300 rounded-box shadow-xl z-50">
    <div class="p-3 border-b border-base-300 flex items-center justify-between">
      <span class="font-semibold text-sm">Notifications</span>
      <a href="{% url 'notifications:notification_list' %}" class="link link-primary text-xs">View all</a>
    </div>
    <div class="max-h-80 overflow-y-auto"
         hx-get="{% url 'notifications:notification_list' %}"
         hx-trigger="notification-updated from:body"
         hx-swap="innerHTML"
         hx-target="this">
      {% include "notifications/_notification_bell_list.html" %}
    </div>
  </div>
</div>
