{% extends "tickets/base.html" %}
{% load i18n %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-semibold">
            {% if mode == 'create' %}{% trans "Create New Ticket" %}{% else %}{% trans "Edit Ticket" %} — {{ obj.ticket_number }}{% endif %}
        </h1>
        <a href="{% url 'tickets:ticket_list' %}" class="btn btn-ghost btn-sm">{% trans "Back to list" %}</a>
    </div>

    <div class="card bg-base-100 border border-base-300">
        <div class="card-body">
            {% include "tickets/_ticket_form_partial.html" %}
        </div>
    </div>
</div>
{% endblock %}
